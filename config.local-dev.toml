# Local multi-repository RepoForge configuration for Trung Ngo.
# Repositories: RepoForge itself and Work Frontier.
# Install as ~/.config/repoforge/config.toml after reviewing.

[server]
workspace_root = "~/.local/share/repoforge/workspaces"
state_root = "~/.local/state/repoforge"
max_file_bytes = 2000000
max_tool_output_chars = 120000
default_command_timeout_seconds = 120
verification_timeout_seconds = 1800
max_fingerprint_bytes = 52428800
max_batch_files = 20
path_prefixes = ["/opt/homebrew/bin", "/usr/local/bin", "/usr/bin", "/bin"]
allowed_environment = [
  "HOME",
  "PATH",
  "LANG",
  "LC_ALL",
  "SSH_AUTH_SOCK",
  "GH_HOST",
  "GIT_SSH_COMMAND",
  "COREPACK_HOME",
  "PNPM_HOME",
  "UV_CACHE_DIR",
  "XDG_CACHE_HOME",
]

[repositories.repoforge]
path = "/Users/trung.ngo/Documents/zaob-dev/repoforge"
display_name = "RepoForge"
remote = "origin"
default_base = "main"
allowed_base_branches = ["main"]
branch_prefix = "ai/"
protected_branches = ["main", "master", "develop", "production"]
require_verification_before_commit = true
fetch_before_workspace = true
default_verification_profile = "full"
max_changed_files = 80
max_diff_lines = 8000
max_total_changed_bytes = 10485760
allowed_paths = []
denied_paths = [
  ".git",
  ".git/**",
  ".env",
  ".env.*",
  "**/.env",
  "**/.env.*",
  "**/*.pem",
  "**/*.key",
  "**/*secret*",
  "**/*credential*",
  ".github/workflows/**",
]
pr_labels = []
pr_reviewers = []
no_maintainer_edit = false

[repositories.repoforge.profiles.setup]
description = "Synchronize the locked RepoForge development environment"
verification = false
timeout_seconds = 900
commands = [["make", "setup"]]

[repositories.repoforge.profiles.quick]
description = "Run Ruff and strict Mypy without the full test/build gate"
verification = true
timeout_seconds = 600
commands = [
  ["make", "lint"],
  ["make", "typecheck"],
]

[repositories.repoforge.profiles.test]
description = "Run the RepoForge test suite with branch coverage enforcement"
verification = true
timeout_seconds = 900
commands = [["make", "test"]]

[repositories.repoforge.profiles.build]
description = "Build the RepoForge wheel and source distribution"
verification = true
timeout_seconds = 600
commands = [["make", "build"]]

[repositories.repoforge.profiles.full]
description = "Run lint, strict typing, tests with coverage, and package builds"
verification = true
timeout_seconds = 1800
commands = [["make", "check"]]

[repositories.work-frontier]
path = "/Users/trung.ngo/Documents/zaob-dev/work-frontier"
display_name = "Work Frontier"
remote = "origin"
default_base = "main"
allowed_base_branches = ["main"]
branch_prefix = "ai/"
protected_branches = ["main", "master", "develop", "production"]
require_verification_before_commit = true
fetch_before_workspace = true
default_verification_profile = "full"

# Generous enough for planned implementation work, but low enough to catch
# accidental generated trees, dependency directories, or scope explosions.
max_changed_files = 150
max_diff_lines = 12000
max_total_changed_bytes = 26214400

# Empty means all repository paths are eligible unless denied below.
allowed_paths = []

denied_paths = [
  ".git",
  ".git/**",
  ".env",
  ".env.*",
  "**/.env",
  "**/.env.*",
  "**/*.pem",
  "**/*.key",
  "**/*secret*",
  "**/*credential*",
  ".github/workflows/**",
]

pr_labels = []
pr_reviewers = []
no_maintainer_edit = false

[repositories.work-frontier.profiles.setup]
description = "Install the exact locked Python and Node dependencies"
verification = false
timeout_seconds = 1800
commands = [["make", "bootstrap"]]

[repositories.work-frontier.profiles.fix]
description = "Apply the repository's safe Python and frontend fixes; inspect the diff afterward"
verification = false
timeout_seconds = 1800
commands = [["make", "fix"]]

[repositories.work-frontier.profiles.quick]
description = "Fast pre-push gate: static checks, contract/registry drift checks, architecture checks, and unit tests"
verification = true
timeout_seconds = 1800
commands = [["make", "check"]]

[repositories.work-frontier.profiles.test]
description = "Run all Python and frontend unit tests"
verification = true
timeout_seconds = 1800
commands = [["make", "test"]]

[repositories.work-frontier.profiles.preflight]
description = "Run ADR-006 foundation validation and behavioral tests"
verification = true
timeout_seconds = 600
commands = [["make", "check-preflight"]]

[repositories.work-frontier.profiles.architecture]
description = "Enforce canonical Python import boundaries"
verification = true
timeout_seconds = 600
commands = [["make", "check-architecture"]]

[repositories.work-frontier.profiles.contracts]
description = "Fail when generated contract artifacts drift"
verification = true
timeout_seconds = 600
commands = [["make", "check-contracts"]]

[repositories.work-frontier.profiles.registry]
description = "Fail when the machine-readable harness registry drifts"
verification = true
timeout_seconds = 600
commands = [["make", "check-harness-registry"]]

[repositories.work-frontier.profiles.full]
description = "Full local CI-equivalent gate, including PostgreSQL migration and MinIO storage smokes"
verification = true
timeout_seconds = 3600
commands = [["make", "verify"]]

[repositories.work-frontier.profiles.recertify]
description = "Run the registered foundation closure and write exact-revision supersession evidence"
verification = true
timeout_seconds = 3600
commands = [["make", "recertify-foundation"]]

[repositories.zamery-studio]
path = "/Users/trung.ngo/Documents/zaob-dev/zamery-studio"
display_name = "Zamery Studio"
remote = "origin"
default_base = "main"
allowed_base_branches = ["main"]
branch_prefix = "ai/"
protected_branches = ["main", "master", "develop", "production"]
require_verification_before_commit = true
fetch_before_workspace = true
default_verification_profile = "full"
max_changed_files = 150
max_diff_lines = 12000
max_total_changed_bytes = 26214400
allowed_paths = []
denied_paths = [
  ".git",
  ".git/**",
  ".env",
  ".env.*",
  "**/.env",
  "**/.env.*",
  "**/*.pem",
  "**/*.key",
  "**/*secret*",
  "**/*credential*",
]
pr_labels = []
pr_reviewers = []
