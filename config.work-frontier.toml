# RepoForge source configuration for the Work Frontier repository.
#
# Source clone: /Users/trung.ngo/Documents/zaob-dev/work-frontier
#
# This is the modern v2 *source* format. Enroll it (or merge the [[repo]] entry into an
# existing multi-repository source config) with:
#
#   rf setup --config ~/.config/repoforge/config.toml
#   rf repo refresh work-frontier --accept
#
# Server bounds, budgets, and path policy come from the reviewed templates and defaults;
# the durable policy patch below carries the repository's hand-tuned command profiles
# and survives `rf repo refresh`.
version = 2

# Omit [tunnel] for local-only stdio operation.
# [tunnel]
# id = "tunnel_replace_me"
# profile = "repoforge"

[[repo]]
id = "work-frontier"
path = "/Users/trung.ngo/Documents/zaob-dev/work-frontier"
decisions = ["dependency_install=exclude", "existing_worktrees=use_new_isolated"]

[repo.policy_patch.profiles.setup]
description = "Install the exact locked Python and Node dependencies"
verification = false
timeout_seconds = 1800
commands = [["make", "bootstrap"]]

[repo.policy_patch.profiles.fix]
description = "Apply the repository's safe Python and frontend fixes; inspect the diff afterward"
verification = false
timeout_seconds = 1800
commands = [["make", "fix"]]

[repo.policy_patch.profiles.quick]
description = "Fast pre-push gate: static checks, contract/registry drift checks, architecture checks, and unit tests"
verification = true
timeout_seconds = 1800
commands = [["make", "check"]]

[repo.policy_patch.profiles.test]
description = "Run all Python and frontend unit tests"
verification = true
timeout_seconds = 1800
commands = [["make", "test"]]

[repo.policy_patch.profiles.preflight]
description = "Run ADR-006 foundation validation and behavioral tests"
verification = true
timeout_seconds = 600
commands = [["make", "check-preflight"]]

[repo.policy_patch.profiles.architecture]
description = "Enforce canonical Python import boundaries"
verification = true
timeout_seconds = 600
commands = [["make", "check-architecture"]]

[repo.policy_patch.profiles.contracts]
description = "Fail when generated contract artifacts drift"
verification = true
timeout_seconds = 600
commands = [["make", "check-contracts"]]

[repo.policy_patch.profiles.registry]
description = "Fail when the machine-readable harness registry drifts"
verification = true
timeout_seconds = 600
commands = [["make", "check-harness-registry"]]

[repo.policy_patch.profiles.full]
description = "Full local CI-equivalent gate, including PostgreSQL migration and MinIO storage smokes"
verification = true
timeout_seconds = 3600
commands = [["make", "verify"]]

[repo.policy_patch.profiles.recertify]
description = "Run the registered foundation closure and write exact-revision supersession evidence"
verification = true
timeout_seconds = 3600
commands = [["make", "recertify-foundation"]]
