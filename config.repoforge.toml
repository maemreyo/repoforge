# RepoForge source configuration for developing RepoForge with RepoForge.
#
# This is the modern v2 *source* format: you declare repositories, decisions, and a
# durable policy patch; `rf setup` / `rf repo refresh --accept` expand it into reviewed
# immutable generations (server bounds, budgets, and path policy come from the reviewed
# templates and defaults). Enroll it with:
#
#   rf setup --config ~/.config/repoforge/config.toml   # or merge the [[repo]] below
#   rf repo refresh repoforge --accept
#
# The legacy resolved `[server]`/`[repositories.*]` format previously shown here is
# still accepted for serve/doctor/runtime, but repository mutation and agent-driven
# policy changes require this source format. Optional repository risk metadata and
# GitHub-native ticket metadata are preserved into reviewed resolved generations.
version = 2

# Omit [tunnel] for local-only stdio operation.
# [tunnel]
# id = "tunnel_replace_me"
# profile = "repoforge"

[[repo]]
id = "repoforge"
path = "/Users/trung.ngo/Documents/zaob-dev/repoforge"
decisions = [
  "dependency_install=exclude",
  "existing_worktrees=use_new_isolated",
  "risky_commands=exclude",
]

# GitHub is the operational ticket source. Project fields are an optional overlay;
# native sub-issues rooted at #3 define membership even without a Project target.
[repositories.repoforge.ticket_graph]
root_issue = 3
repository = "maemreyo/repoforge"

[repositories.repoforge.risk]
low_max = 24
medium_max = 49
high_max = 74
final_profile = "full"
ordered_profiles = ["quick", "test", "full"]
narrow_diagnostics = ["pytest-target", "release-contract-diff"]
critical_globs = [
  ".github/workflows/**",
  "**/auth*.py",
  "**/config.py",
  "**/runtime*.py",
  "**/schema*.py",
  "**/security*.py",
  "scripts/verify-production.sh",
]
public_contract_globs = [
  "src/repoforge/config.py",
  "src/repoforge/domain/errors.py",
  "src/repoforge/interfaces/cli/**",
  "src/repoforge/interfaces/mcp/**",
]
manifest_globs = ["**/uv.lock", "pyproject.toml", "**/package-lock.json", "**/pnpm-lock.yaml"]
docs_globs = ["*.md", "docs/**"]

# Reviewed customizations survive `rf repo refresh` and are applied on top of the
# template-derived proposal. The hand-tuned profiles below supersede the auto-detected
# Makefile/pytest candidates, which are removed to keep one authoritative set.
[repo.policy_patch]
execution_mode = "relaxed"
adhoc_runners = ["uv", "python3", "make"]
adhoc_timeout_seconds = 600
remove_profiles = ["make-check", "make-test", "python-test", "ticket-graph"]

[repo.policy_patch.profiles.setup]
description = "Synchronize the locked RepoForge development environment"
verification = false
timeout_seconds = 900
commands = [["make", "setup"]]

[repo.policy_patch.profiles.quick]
description = "Run Ruff and strict Mypy without the full test/build gate"
verification = true
timeout_seconds = 600
commands = [
  ["uv", "run", "ruff", "format", "--check", "src", "tests", "scripts"],
  ["uv", "run", "ruff", "check", "src", "tests", "scripts"],
  ["uv", "run", "mypy", "--strict", "src/repoforge"],
]

[repo.policy_patch.profiles.test]
description = "Run the RepoForge test suite with branch coverage enforcement"
verification = true
timeout_seconds = 900
commands = [["make", "test"]]

[repo.policy_patch.profiles.build]
description = "Build the RepoForge wheel and source distribution"
verification = true
timeout_seconds = 600
commands = [["make", "build"]]

[repo.policy_patch.profiles.full]
description = "Run the authoritative RepoForge production gate on the current workspace tree"
verification = true
timeout_seconds = 1800
commands = [["scripts/verify-production.sh", "--allow-dirty"]]

[repo.policy_patch.diagnostics.pytest-target]
summary = "Run one tracked pytest path or node without changing verification profiles"
argv = ["uv", "run", "--extra", "dev", "pytest", "{selector}", "-q"]
selector_kind = "pytest_node"
timeout_seconds = 300
network_policy = "local_only"
mutability = "read_only"
parser = "pytest"
output_limit = 12000

[repo.policy_patch.diagnostics.release-contract-diff]
summary = "Check the reviewed release contract without updating it"
argv = ["uv", "run", "--extra", "dev", "python", "scripts/check_release_contracts.py"]
selector_kind = "none"
timeout_seconds = 120
network_policy = "local_only"
mutability = "read_only"
parser = "release_contract"
output_limit = 8000

[repo.policy_patch.formatters.ruff-format]
summary = "Check or format policy-allowed changed Python files with Ruff"
check_argv = ["uv", "run", "--extra", "dev", "ruff", "format", "--check", "--"]
fix_argv = ["uv", "run", "--extra", "dev", "ruff", "format", "--"]
include_globs = ["src/**/*.py", "tests/**/*.py", "scripts/**/*.py"]
timeout_seconds = 300
output_limit = 12000
max_paths = 1000
baseline_cache_ttl_seconds = 3600
network_policy = "local_only"
parser = "ruff_format"
