# Checked-in capability-group manifest for module-aware test selection.
# See scripts/select_affected_tests.py. Every tests/test_*.py file must appear in
# exactly one group's `test_files` list -- `select_affected_tests.py --check-completeness`
# enforces this and fails closed (escalates to test-wide) on any gap.
#
# parallel = false means the group runs in the SERIAL lane (alone, one process,
# before the xdist lane) for a CORRECTNESS reason: its tests share global state
# outside pytest's tmp_path (fixed-path unix sockets/pidfiles, managed-runtime
# state) and would corrupt each other if run concurrently. It is NOT a knob for
# "slow" or "git-heavy" tests -- git-subprocess contention is handled by the
# pytest --timeout budget in pyproject.toml, so those tests stay parallel.
# Serializing merely-heavy tests is a net time loss (the serial lane is a
# sequential bottleneck; see the test-fast lane-split commit history).

[groups.contracts]
description = "MCP schemas, fixed 28-tool roster, serialization, egress, release contracts."
# parallel = true: a few of these drive real MCP sessions / git through
# SubprocessCommandExecutor, but they are tmp_path-isolated, so xdist-safe.
# Their earlier 60s-timeout flakiness under contention was a timeout-layer
# inversion (pytest --timeout was below the app's own git budget), fixed by
# raising --timeout to 120 in pyproject.toml -- not a reason to serialize.
parallel = true
source_globs = [
  "src/repoforge/contracts/**",
  "src/repoforge/interfaces/mcp/**",
  "src/repoforge/domain/errors.py",
  "src/repoforge/domain/client_capabilities.py",
