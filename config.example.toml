# Minimal multi-repository RepoForge configuration.
# Omitted server and repository fields use secure built-in defaults.

[repositories.repoforge]
path = "/Users/you/src/repoforge"

# Actions never satisfy the verified-commit gate.
[repositories.repoforge.actions]
setup = ["make", "setup"]

# Checks do satisfy the verified-commit gate.
# A check named "full" becomes the default automatically.
[repositories.repoforge.checks]
quick = [
  ["make", "lint"],
  ["make", "typecheck"],
]
test = ["make", "test"]
full = ["make", "check"]

[repositories.work-frontier]
path = "/Users/you/src/work-frontier"

[repositories.work-frontier.actions]
setup = ["make", "bootstrap"]
fix = ["make", "fix"]

[repositories.work-frontier.checks]
quick = ["make", "check"]
test = ["make", "test"]
full = ["make", "verify"]

# Advanced profile tables remain supported when descriptions, custom timeouts,
# or non-standard verification semantics are required:
#
# [repositories.work-frontier.profiles.recertify]
# description = "Run exact-revision recertification"
# verification = true
# timeout_seconds = 3600
# commands = [["make", "recertify-foundation"]]
