# Minimal RepoForge source configuration. `rf setup` creates this file for you.
# Provider manifests are enrolled separately into reviewed immutable configuration;
# this editable source file cannot grant provider capabilities.
version = 2

# Omit [tunnel] for local-only stdio operation.
[tunnel]
id = "tunnel_replace_me"
profile = "repoforge"

[[repo]]
id = "example-repository"
path = "/absolute/path/to/repository"

# The generated reviewed lock expands all policy settings. Source onboarding defaults
# to the standard template; a path-only resolved repository defaults to strict.
# Use policy_overrides only after review.
# policy_template = "strict"
# decisions = []
# policy_overrides = []

# Reviewed policy customizations (custom profiles, diagnostics, formatters) live in a
# durable per-repository patch that survives `rf repo refresh`. The `repo_policy`
# preview/apply flow writes reviewed changes; edit by hand only with review.
# [repo.policy_patch]
# execution_mode = "relaxed"
# adhoc_runners = ["uv", "python3", "make"]
# adhoc_timeout_seconds = 600
# remove_profiles = []
# [repo.policy_patch.profiles.debug]
# description = "One-off debug run"
# verification = false
# commands = [["pnpm", "run", "debug:server"]]

# Generated paths name an approved regeneration command. Refresh conflict evidence points agents
# at this command instead of encouraging hand-merges.
# [[repositories.example-repository.generated_paths]]
# glob = "docs/contracts/tool-schemas-v2.json"
# regeneration_command = ["make", "schemas"]
# description = "Generated Forge v2 tool schema bundle"

# GitHub issue writes are explicit per-repository authority. Comment is the safe default; enable
# close/reopen/link/create only after review. Project V2 writes are never enabled here.
# [repositories.example-repository.issue_writes]
# enabled_ops = ["comment"]
# approval_required_ops = []
# max_writes_per_call = 2
# max_writes_per_window = 20
# window_seconds = 3600
# create_title_prefix = "[TASK]"
# create_body_template = "## Objective\n{body}\n\n## Evidence\n{evidence_ref}"
