# Minimal RepoForge source configuration. `rf setup` creates this file for you.
# Provider manifests are enrolled separately into reviewed immutable configuration;
# this editable source file cannot grant provider capabilities.
version = 2

# Omit [tunnel] for local-only stdio operation.
[tunnel]
id = "tunnel_replace_me"
profile = "repoforge"

[[repo]]
id = "example-repository"
path = "/absolute/path/to/repository"

# The generated reviewed lock expands all policy settings. Source onboarding defaults
# to the standard template; a path-only resolved repository defaults to strict.
# Use policy_overrides only after review.
# policy_template = "strict"
# decisions = []
# policy_overrides = []

# Reviewed policy customizations (custom profiles, diagnostics, formatters) live in a
# durable per-repository patch that survives `rf repo refresh`. It is written by approved
# `repo_policy_apply` changes; edit by hand only with review.
# [repo.policy_patch]
# remove_profiles = []
# [repo.policy_patch.profiles.debug]
# description = "One-off debug run"
# verification = false
# commands = [["pnpm", "run", "debug:server"]]
