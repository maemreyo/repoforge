# Minimal RepoForge source configuration. `rf setup` creates this file for you.
# Provider manifests are enrolled separately into reviewed immutable configuration;
# this editable source file cannot grant provider capabilities.
version = 2

# Omit [tunnel] for local-only stdio operation.
[tunnel]
id = "tunnel_replace_me"
profile = "repoforge"

[[repo]]
id = "example-repository"
path = "/absolute/path/to/repository"
policy_template = "standard"
decisions = []
policy_overrides = []
