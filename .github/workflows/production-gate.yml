name: production-gate

on:
  pull_request:
  push:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: production-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.10"
          enable-cache: true
      - run: uv sync --extra dev --frozen
      - run: uv run python scripts/check_release_contracts.py
      - run: uv run ruff format --check src tests scripts
      - run: uv run ruff check src tests scripts
      - run: uv run mypy --strict src/repoforge
      # Manifest completeness + coverage-map staleness (map must not reference
      # deleted/renamed test files). The full suite still runs below, so this is
      # a fast correctness guard on the test-selection metadata, not a gate on
      # the map being perfectly fresh.
      - run: uv run python scripts/select_affected_tests.py --check-completeness
      - name: Record exact HEAD and require tracked cleanliness
        run: |
          git rev-parse HEAD
          git diff --exit-code
          git diff --cached --exit-code

  tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
          - os: ubuntu-latest
            python: "3.13"
          - os: macos-latest
            python: "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv sync --extra dev --frozen
      - name: Guided onboarding real-Git regressions
        run: uv run pytest tests/test_onboarding_real_git.py tests/test_repository_discovery.py
      - run: uv run pytest --timeout=60 --cov=repoforge --cov-branch --cov-report=term-missing

  package:
    needs: [static-contracts, tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --extra dev --frozen
      - run: uv build
      - run: scripts/verify-wheel-install.sh dist
      - name: Ensure build did not rewrite tracked files
        run: git diff --exit-code
