name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Full-suite-with-coverage, package build, and wheel-install verification are the
  # authoritative production-gate.yml workflow's job (across the full Python/OS matrix);
  # this workflow stays focused on the fastest possible lint/type feedback for a PR so
  # the two workflows don't both run a full pytest+coverage pass on every push.
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: uv sync --extra dev --locked
      - run: uv run ruff format --check src tests
      - run: uv run ruff check src tests
      - run: uv run mypy --strict src/repoforge
