name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Synchronize locked dependencies
        run: uv sync --extra dev --locked

      - name: Ruff
        run: uv run ruff check .

      - name: Strict Mypy
        run: uv run mypy src/repoforge

      - name: Tests and branch coverage
        run: uv run pytest --cov=repoforge --cov-report=term-missing

      - name: MCP contract regression
        run: uv run pytest -q tests/test_mcp_contract.py

      - name: Build wheel and source distribution
        run: uv build
